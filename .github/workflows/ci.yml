name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        php: ['8.3', '8.4', '8.5']
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Path repos need a named branch (shallow detached HEAD → dev-{hash})
        run: git checkout -B main
      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none
          extensions: intl, pdo_sqlite
      - run: composer install --prefer-dist --no-progress
      - run: composer test
      - run: composer analyse || true

  coverage:
    name: Test coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - run: git checkout -B main
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          coverage: pcov
          extensions: intl, pcov, pdo_sqlite
      - run: composer install --prefer-dist --no-progress
      - run: composer test:coverage:report
      - uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.xml
      - uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage.xml
          fail_ci_if_error: false
          slug: velmphp/velm
          verbose: true

  app-install:
    name: velmphp/app install smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Path repos need a named branch (shallow detached HEAD → dev-{hash})
        run: git checkout -B main
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          coverage: none
          extensions: intl, pdo_sqlite
      - name: Bootstrap Composer deps (merge plugin loads after vendor exists)
        working-directory: apps/app
        run: composer update --no-interaction --prefer-dist --no-progress
      - name: Link monorepo packages (pre-Packagist)
        run: cp apps/app/composer.local.json.example apps/app/composer.local.json
      - name: Switch to path repositories
        working-directory: apps/app
        run: composer update --no-interaction --prefer-dist --no-progress
      - name: Bundled modules present in vendor
        run: test -f apps/app/vendor/velmphp/modules/modules/base/__velm__.php
      - name: App bootstrap
        working-directory: apps/app
        run: |
          cp .env.example .env
          php artisan key:generate --force
          touch database/database.sqlite
          php artisan migrate --force
          php artisan velm:migrate

  demo-setup:
    name: velm demo app setup smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Path repos need a named branch (shallow detached HEAD → dev-{hash})
        run: git checkout -B main
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          coverage: none
          extensions: intl, pdo_sqlite
      - name: composer install
        working-directory: apps/demo
        run: composer install --prefer-dist --no-progress
      - name: Demo addons on disk
        run: test -f apps/demo/addons/demo_relations/__velm__.php
      - name: Full demo setup
        working-directory: apps/demo
        run: |
          cp .env.example .env
          php artisan key:generate --force
          composer run velm-setup

  test-mysql:
    name: PHPUnit (MySQL)
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: velm_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    env:
      DB_CONNECTION: mysql
      DB_HOST: 127.0.0.1
      DB_PORT: 3306
      DB_DATABASE: velm_test
      DB_USERNAME: root
      DB_PASSWORD: root
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - run: git checkout -B main
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          coverage: none
          extensions: intl, pdo_mysql
      - run: composer install --prefer-dist --no-progress
      - run: composer test -- packages/modules/tests/Feature/DatabaseDialectSmokeTest.php

  test-postgres:
    name: PHPUnit (PostgreSQL)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: velm_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    env:
      DB_CONNECTION: pgsql
      DB_HOST: 127.0.0.1
      DB_PORT: 5432
      DB_DATABASE: velm_test
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - run: git checkout -B main
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          coverage: none
          extensions: intl, pdo_pgsql
      - run: composer install --prefer-dist --no-progress
      - run: composer test -- packages/modules/tests/Feature/DatabaseDialectSmokeTest.php
