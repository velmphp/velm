name: Split packages to mirror repos

# Pushes each publishable package to its own GitHub repo for Packagist.org.
# Monorepo source of truth stays velmphp/velm — do not submit velmphp/velm-dev to Packagist.

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

concurrency:
  group: split-packages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  split:
    name: ${{ matrix.package.composer }} → velmphp/${{ matrix.package.repository }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package:
          - { composer: velmphp/core, directory: packages/core, repository: core }
          - { composer: velmphp/views, directory: packages/views, repository: views }
          - { composer: velmphp/modules, directory: packages/modules, repository: modules }
          - { composer: velmphp/console, directory: packages/console, repository: console }
          - { composer: velmphp/web, directory: packages/web, repository: web }
          - { composer: velmphp/ui, directory: packages/ui, repository: ui }
          - { composer: velmphp/admin, directory: packages/admin, repository: admin }
          - { composer: velmphp/framework, directory: packages/framework, repository: framework }
          - { composer: velmphp/app, directory: apps/app, repository: app }

    steps:
      - name: Check split token is configured
        id: gate
        env:
          PACKAGIST_SPLIT_TOKEN: ${{ secrets.PACKAGIST_SPLIT_TOKEN }}
        run: |
          if [ -z "$PACKAGIST_SPLIT_TOKEN" ]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "::notice::PACKAGIST_SPLIT_TOKEN is not set — skipping split (see PACKAGIST.md)"
          else
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v4
        if: steps.gate.outputs.enabled == 'true'
        with:
          fetch-depth: 0

      - name: Split to mirror (branch)
        if: steps.gate.outputs.enabled == 'true' && !startsWith(github.ref, 'refs/tags/')
        uses: danharrin/monorepo-split-github-action@v2.4.5
        env:
          GITHUB_TOKEN: ${{ secrets.PACKAGIST_SPLIT_TOKEN }}
        with:
          package_directory: ${{ matrix.package.directory }}
          repository_organization: velmphp
          repository_name: ${{ matrix.package.repository }}
          user_name: github-actions[bot]
          user_email: 41898282+github-actions[bot]@users.noreply.github.com

      - name: Split to mirror (tag)
        if: steps.gate.outputs.enabled == 'true' && startsWith(github.ref, 'refs/tags/')
        uses: danharrin/monorepo-split-github-action@v2.4.5
        env:
          GITHUB_TOKEN: ${{ secrets.PACKAGIST_SPLIT_TOKEN }}
        with:
          tag: ${{ github.ref_name }}
          package_directory: ${{ matrix.package.directory }}
          repository_organization: velmphp
          repository_name: ${{ matrix.package.repository }}
          user_name: github-actions[bot]
          user_email: 41898282+github-actions[bot]@users.noreply.github.com
