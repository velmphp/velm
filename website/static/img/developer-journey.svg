<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 320" role="img" aria-labelledby="title">
  <title id="title">Velm developer journey</title>

  <rect width="1100" height="320" fill="#ffffff"/>

  <text x="550" y="34" text-anchor="middle" font-family="Segoe UI, system-ui, sans-serif" font-size="22" fill="#1e1e1e">create-project &#8594; generate &#8594; code &#8594; migrate &#8594; ship</text>

  <path d="M 50 175 Q 275 150 550 175 T 1050 175" fill="none" stroke="#ced4da" stroke-width="2" stroke-dasharray="8 6" stroke-linecap="round"/>

  <!-- 1 Start -->
  <rect x="20" y="70" width="180" height="155" rx="8" fill="#a5d8ff" stroke="#1e1e1e" stroke-width="2"/>
  <text x="110" y="102" text-anchor="middle" font-family="Segoe UI, system-ui, sans-serif" font-size="18" font-weight="700" fill="#1e1e1e">Start</text>
  <text x="110" y="128" text-anchor="middle" font-family="Segoe UI, system-ui, sans-serif" font-size="13" fill="#1e1e1e">create-project</text>
  <text x="110" y="150" text-anchor="middle" font-family="Segoe UI, system-ui, sans-serif" font-size="13" fill="#1e1e1e">composer run setup</text>
  <text x="110" y="190" text-anchor="middle" font-family="Segoe UI, system-ui, sans-serif" font-size="12" fill="#495057">Laravel + /velm</text>

  <line x1="206" y1="147" x2="228" y2="147" stroke="#1e1e1e" stroke-width="2" stroke-linecap="round"/>
  <polygon points="228,147 220,143 220,151" fill="#1e1e1e"/>

  <!-- 2 Generate -->
  <rect x="230" y="70" width="180" height="155" rx="8" fill="#d0bfff" stroke="#1e1e1e" stroke-width="2"/>
  <text x="320" y="102" text-anchor="middle" font-family="Segoe UI, system-ui, sans-serif" font-size="18" font-weight="700" fill="#1e1e1e">Generate</text>
  <text x="320" y="128" text-anchor="middle" font-family="Segoe UI, system-ui, sans-serif" font-size="13" fill="#1e1e1e">velm:make:module</text>
  <text x="320" y="150" text-anchor="middle" font-family="Segoe UI, system-ui, sans-serif" font-size="13" fill="#1e1e1e">addons/my_module</text>
  <text x="320" y="190" text-anchor="middle" font-family="Segoe UI, system-ui, sans-serif" font-size="12" fill="#495057">manifest + scaffold</text>

  <line x1="416" y1="147" x2="438" y2="147" stroke="#1e1e1e" stroke-width="2" stroke-linecap="round"/>
  <polygon points="438,147 430,143 430,151" fill="#1e1e1e"/>

  <!-- 3 Code -->
  <rect x="440" y="70" width="180" height="155" rx="8" fill="#b2f2bb" stroke="#1e1e1e" stroke-width="2"/>
  <text x="530" y="102" text-anchor="middle" font-family="Segoe UI, system-ui, sans-serif" font-size="18" font-weight="700" fill="#1e1e1e">Code</text>
  <text x="530" y="128" text-anchor="middle" font-family="Segoe UI, system-ui, sans-serif" font-size="13" fill="#1e1e1e">models + views</text>
  <text x="530" y="150" text-anchor="middle" font-family="Segoe UI, system-ui, sans-serif" font-size="13" fill="#1e1e1e">list, form, menus</text>
  <text x="530" y="190" text-anchor="middle" font-family="Segoe UI, system-ui, sans-serif" font-size="12" fill="#495057">PHP in addons/</text>

  <line x1="626" y1="147" x2="648" y2="147" stroke="#1e1e1e" stroke-width="2" stroke-linecap="round"/>
  <polygon points="648,147 640,143 640,151" fill="#1e1e1e"/>

  <!-- 4 Migrate -->
  <rect x="650" y="70" width="180" height="155" rx="8" fill="#fff3bf" stroke="#1e1e1e" stroke-width="2"/>
  <text x="740" y="102" text-anchor="middle" font-family="Segoe UI, system-ui, sans-serif" font-size="18" font-weight="700" fill="#1e1e1e">Migrate</text>
  <text x="740" y="128" text-anchor="middle" font-family="Segoe UI, system-ui, sans-serif" font-size="13" fill="#1e1e1e">velm:migrate</text>
  <text x="740" y="150" text-anchor="middle" font-family="Segoe UI, system-ui, sans-serif" font-size="13" fill="#1e1e1e">module:install</text>
  <text x="740" y="190" text-anchor="middle" font-family="Segoe UI, system-ui, sans-serif" font-size="12" fill="#495057">schema + UI sync</text>

  <line x1="836" y1="147" x2="858" y2="147" stroke="#1e1e1e" stroke-width="2" stroke-linecap="round"/>
  <polygon points="858,147 850,143 850,151" fill="#1e1e1e"/>

  <!-- 5 Ship -->
  <rect x="860" y="70" width="180" height="155" rx="8" fill="#ffc9c9" stroke="#1e1e1e" stroke-width="2"/>
  <text x="950" y="102" text-anchor="middle" font-family="Segoe UI, system-ui, sans-serif" font-size="18" font-weight="700" fill="#1e1e1e">Ship</text>
  <text x="950" y="128" text-anchor="middle" font-family="Segoe UI, system-ui, sans-serif" font-size="13" fill="#1e1e1e">deploy Laravel</text>
  <text x="950" y="150" text-anchor="middle" font-family="Segoe UI, system-ui, sans-serif" font-size="13" fill="#1e1e1e">velm:migrate</text>
  <text x="950" y="190" text-anchor="middle" font-family="Segoe UI, system-ui, sans-serif" font-size="12" fill="#495057">/velm live</text>

  <text x="550" y="268" text-anchor="middle" font-family="Segoe UI, system-ui, sans-serif" font-size="13" fill="#868e96">One stack &#183; modules per database</text>
</svg>
