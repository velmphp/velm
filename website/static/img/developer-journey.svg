<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 420" role="img" aria-labelledby="title desc">
  <title id="title">Velm developer journey: start, code, ship</title>
  <desc id="desc">A three-step doodle showing how developers create a Velm app, author modules in PHP, and deploy to production on Laravel.</desc>
  <defs>
    <style>
      .t { font-family: "Segoe UI", system-ui, sans-serif; fill: #1e1e1e; }
      .h { font-size: 22px; font-weight: 700; }
      .s { font-size: 13px; }
      .c { font-size: 11px; font-family: ui-monospace, "Cascadia Code", monospace; }
      .n { font-size: 42px; font-weight: 700; opacity: 0.12; }
      .fig { fill: none; stroke: #1e1e1e; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#1e1e1e"/>
    </marker>
  </defs>

  <rect x="8" y="8" width="944" height="404" rx="16" fill="#fafafa" stroke="#e9ecef" stroke-width="2"/>

  <text x="480" y="44" text-anchor="middle" class="t h">Your path: start &#8594; code &#8594; ship</text>
  <text x="480" y="66" text-anchor="middle" class="t s" fill="#495057">One Laravel app. PHP modules. Working admin UI &#8212; no second framework to learn.</text>

  <!-- winding path (developer walks this) -->
  <path id="journey-path" d="M 88 200 Q 200 170 320 200 T 560 200 T 800 200" fill="none" stroke="#ced4da" stroke-width="3" stroke-dasharray="8 6" stroke-linecap="round"/>

  <!-- stick figure: mid-journey, walking right with laptop -->
  <g transform="translate(468, 152)">
    <!-- motion scribble -->
    <path d="M -28 58 Q -20 54 -12 58" class="fig" stroke-width="2" opacity="0.5"/>
    <path d="M -34 52 L -26 50 M -34 48 L -24 46" class="fig" stroke-width="1.5" opacity="0.4"/>

    <!-- laptop under arm -->
    <rect x="14" y="22" width="22" height="16" rx="2" fill="#a5d8ff" stroke="#1e1e1e" stroke-width="1.5"/>
    <line x1="18" y1="38" x2="32" y2="38" class="fig" stroke-width="1.5"/>

    <!-- head -->
    <circle cx="0" cy="0" r="11" fill="#fff" class="fig"/>
    <!-- happy dot eyes -->
    <circle cx="-4" cy="-1" r="1.2" fill="#1e1e1e" stroke="none"/>
    <circle cx="4" cy="-1" r="1.2" fill="#1e1e1e" stroke="none"/>
    <path d="M -4 4 Q 0 7 4 4" class="fig" stroke-width="1.5"/>

    <!-- body -->
    <line x1="0" y1="11" x2="0" y2="38" class="fig"/>
    <!-- arms: striding -->
    <line x1="0" y1="20" x2="-16" y2="34" class="fig"/>
    <line x1="0" y1="20" x2="18" y2="28" class="fig"/>
    <!-- legs: walk cycle -->
    <line x1="0" y1="38" x2="-14" y2="58" class="fig"/>
    <line x1="0" y1="38" x2="16" y2="54" class="fig"/>

    <text x="0" y="78" text-anchor="middle" class="t s" font-size="11" font-weight="600">you</text>
  </g>

  <!-- tiny stick figures at milestones -->
  <g transform="translate(118, 318)" opacity="0.85">
    <circle cx="0" cy="0" r="7" fill="#fff" class="fig" stroke-width="2"/>
    <line x1="0" y1="7" x2="0" y2="22" class="fig" stroke-width="2"/>
    <line x1="0" y1="12" x2="-8" y2="18" class="fig" stroke-width="2"/>
    <line x1="0" y1="12" x2="10" y2="10" class="fig" stroke-width="2"/>
    <line x1="0" y1="22" x2="-7" y2="34" class="fig" stroke-width="2"/>
    <line x1="0" y1="22" x2="7" y2="34" class="fig" stroke-width="2"/>
    <!-- coffee -->
    <rect x="12" y="6" width="8" height="10" rx="2" fill="#ffec99" stroke="#1e1e1e" stroke-width="1.2"/>
  </g>

  <g transform="translate(820, 318)" opacity="0.85">
    <circle cx="0" cy="0" r="7" fill="#fff" class="fig" stroke-width="2"/>
    <line x1="0" y1="7" x2="0" y2="22" class="fig" stroke-width="2"/>
    <!-- celebrate arms up -->
    <line x1="0" y1="12" x2="-12" y2="2" class="fig" stroke-width="2"/>
    <line x1="0" y1="12" x2="12" y2="2" class="fig" stroke-width="2"/>
    <line x1="0" y1="22" x2="-6" y2="34" class="fig" stroke-width="2"/>
    <line x1="0" y1="22" x2="6" y2="34" class="fig" stroke-width="2"/>
  </g>

  <!-- ========== 1 START ========== -->
  <g transform="translate(40, 88)">
    <text x="0" y="0" class="t n">1</text>
    <rect x="4" y="12" width="248" height="268" rx="12" fill="#e7f5ff" stroke="#1e1e1e" stroke-width="2"/>
    <text x="128" y="48" text-anchor="middle" class="t h">Start</text>
    <text x="128" y="70" text-anchor="middle" class="t s" fill="#495057">~5 minutes</text>

    <rect x="28" y="88" width="200" height="88" rx="8" fill="#212529" stroke="#1e1e1e" stroke-width="2"/>
    <circle cx="44" cy="104" r="5" fill="#ff6b6b"/>
    <circle cx="60" cy="104" r="5" fill="#ffd43b"/>
    <circle cx="76" cy="104" r="5" fill="#51cf66"/>
    <text x="40" y="132" class="t c" fill="#a5d8ff">$ composer create-project</text>
    <text x="40" y="150" class="t c" fill="#a5d8ff">  velmphp/app my_app</text>
    <text x="40" y="168" class="t c" fill="#b2f2bb">$ composer run setup</text>

    <rect x="88" y="196" width="80" height="52" rx="6" fill="#fff" stroke="#1e1e1e" stroke-width="2"/>
    <rect x="96" y="204" width="64" height="36" rx="3" fill="#a5d8ff" stroke="#1e1e1e" stroke-width="1.5"/>
    <path d="M 72 252 L 184 252 L 196 264 L 60 264 Z" fill="#dee2e6" stroke="#1e1e1e" stroke-width="2" stroke-linejoin="round"/>

    <text x="128" y="286" text-anchor="middle" class="t s">Open <tspan font-weight="700">/velm</tspan> &#8212; panel ready</text>
  </g>

  <path d="M 296 220 C 318 200 302 240 324 220" fill="none" stroke="#1e1e1e" stroke-width="2.5" marker-end="url(#arrow)" stroke-linecap="round"/>

  <!-- ========== 2 CODE ========== -->
  <g transform="translate(336, 88)">
    <text x="0" y="0" class="t n">2</text>
    <rect x="4" y="12" width="288" height="268" rx="12" fill="#ebfbee" stroke="#1e1e1e" stroke-width="2"/>
    <text x="148" y="48" text-anchor="middle" class="t h">Code</text>
    <text x="148" y="70" text-anchor="middle" class="t s" fill="#495057">PHP in your addon folder</text>

    <text x="32" y="100" class="t c">addons/my_module/</text>
    <text x="48" y="120" class="t c">+-- __velm__.php</text>
    <text x="48" y="138" class="t c">+-- models/Product.php</text>
    <text x="48" y="156" class="t c">+-- views/product.php</text>

    <rect x="32" y="172" width="56" height="24" rx="12" fill="#fff" stroke="#1e1e1e" stroke-width="1.5"/>
    <text x="60" y="188" text-anchor="middle" class="t c" font-size="10">ListView</text>
    <rect x="96" y="172" width="56" height="24" rx="12" fill="#fff" stroke="#1e1e1e" stroke-width="1.5"/>
    <text x="124" y="188" text-anchor="middle" class="t c" font-size="10">FormView</text>
    <rect x="160" y="172" width="48" height="24" rx="12" fill="#fff" stroke="#1e1e1e" stroke-width="1.5"/>
    <text x="184" y="188" text-anchor="middle" class="t c" font-size="10">menus</text>

    <rect x="32" y="208" width="224" height="32" rx="8" fill="#fff3bf" stroke="#1e1e1e" stroke-width="2"/>
    <text x="144" y="229" text-anchor="middle" class="t c">php artisan velm:module:sync my_module</text>

    <text x="148" y="272" text-anchor="middle" class="t s">Lists, forms &amp; menus &#8212; no hand-built CRUD</text>
  </g>

  <path d="M 632 220 C 654 200 638 240 660 220" fill="none" stroke="#1e1e1e" stroke-width="2.5" marker-end="url(#arrow)" stroke-linecap="round"/>

  <!-- ========== 3 SHIP ========== -->
  <g transform="translate(672, 88)">
    <text x="0" y="0" class="t n">3</text>
    <rect x="4" y="12" width="248" height="268" rx="12" fill="#fff9db" stroke="#1e1e1e" stroke-width="2"/>
    <text x="128" y="48" text-anchor="middle" class="t h">Ship</text>
    <text x="128" y="70" text-anchor="middle" class="t s" fill="#495057">Same Laravel deploy you know</text>

    <rect x="52" y="92" width="152" height="36" rx="6" fill="#fff" stroke="#1e1e1e" stroke-width="2"/>
    <text x="128" y="115" text-anchor="middle" class="t s">Forge / Docker / VPS</text>
    <rect x="52" y="136" width="152" height="36" rx="6" fill="#fff" stroke="#1e1e1e" stroke-width="2"/>
    <text x="128" y="159" text-anchor="middle" class="t c">php artisan velm:migrate</text>
    <rect x="52" y="180" width="152" height="36" rx="6" fill="#a5d8ff" stroke="#1e1e1e" stroke-width="2"/>
    <text x="128" y="203" text-anchor="middle" class="t s" font-weight="600">/velm &#8212; your modules live</text>

    <path d="M 200 118 L 218 100 L 224 118 L 218 128 Z" fill="#ffc9c9" stroke="#1e1e1e" stroke-width="1.5" stroke-linejoin="round"/>
    <path d="M 212 128 L 208 140 L 220 132 Z" fill="#ffec99" stroke="#1e1e1e" stroke-width="1"/>

    <circle cx="88" cy="248" r="14" fill="#ffc9c9" stroke="#1e1e1e" stroke-width="1.5"/>
    <circle cx="128" cy="248" r="14" fill="#b2f2bb" stroke="#1e1e1e" stroke-width="1.5"/>
    <circle cx="168" cy="248" r="14" fill="#d0bfff" stroke="#1e1e1e" stroke-width="1.5"/>
    <text x="128" y="286" text-anchor="middle" class="t s">Modules install per database</text>
  </g>

  <text x="480" y="398" text-anchor="middle" class="t s" fill="#868e96">Scaffold with velm:make:* &#183; extend with $inherit &#183; ship on Laravel</text>
</svg>
